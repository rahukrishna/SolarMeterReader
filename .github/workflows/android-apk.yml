name: Build Android APK

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Prepare release signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/release.keystore
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build APK
        run: |
          cd android
          if [ -f keystore.properties ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Collect APK
        run: |
          mkdir -p apk-out
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk apk-out/solar-meter-reader.apk
            echo "APK_NAME=solar-meter-reader.apk" >> $GITHUB_ENV
            echo "APK_KIND=release" >> $GITHUB_ENV
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk apk-out/solar-meter-reader-debug.apk
            echo "APK_NAME=solar-meter-reader-debug.apk" >> $GITHUB_ENV
            echo "APK_KIND=debug" >> $GITHUB_ENV
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: solar-meter-reader-apk
          path: apk-out/${{ env.APK_NAME }}

      - name: Publish latest APK release
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android Latest APK
          body: |
            Auto-built from commit ${{ github.sha }}.

            Build type: ${{ env.APK_KIND }}
            - release: signed and production-ready (requires Android signing secrets)
            - debug: installable for testing only
          prerelease: true
          make_latest: false
          files: apk-out/${{ env.APK_NAME }}
          overwrite_files: true
